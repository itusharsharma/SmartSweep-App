name: smartsweep
description: "AI-powered smart storage cleaner built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^16.0.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Permissions
  permission_handler: ^12.0.1

  # File & Device
  path_provider: ^2.1.5
  device_info_plus: ^11.5.0

  # Charts
  fl_chart: ^1.0.0

  # Animations
  lottie: ^3.3.1

  # Notifications
  flutter_local_notifications: ^19.4.0

  # Fonts
  google_fonts: ^6.3.0

  # Localization
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf